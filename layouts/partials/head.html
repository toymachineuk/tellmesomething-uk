/* POSITIONS */



.orbit--1{
top:120px;
left:8%;
animation-duration:14s;
}

.orbit--2{
top:160px;

}

.orbit--3{

.orbit-story{

width:240px;
height:240px;

border-radius:50%;
padding:6px;

background:linear-gradient(
135deg,
#00c6ff,
#0072ff
);

transition:.3s;
}

.orbit-story amp-img,
.orbit-story amp-img img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* FEATURED */

.orbit-story--featured{
width:300px;
height:300px;
background:linear-gradient(
135deg,
#1db954,
#00ffa3
);

box-shadow:
0 0 20px rgba(29,185,84,.35);

animation:orbitPulse 3s infinite;
}



/* FLOAT MOTION */

@keyframes orbitFloat{

0%{transform:translateY(0)}

50%{transform:translateY(-35px)}

100%{transform:translateY(0)}

}

/* FEATURE PULSE */

@keyframes orbitPulse{

0%{transform:scale(1)}

50%{transform:scale(1.06)}

100%{transform:scale(1)}

}

/* INTERACTION */

.orbit a:active{
transform:scale(.95);
}

  border-radius: 50%;

  backdrop-filter: blur(10px);

  color: #fff;

  display: flex;
  align-items: center;

  cursor: pointer;

  transition:

    border-color 0.2s ease,

  width: 16px;

  opacity: 0.96;
}

  .story-close:hover {
    background:
      rgba(255,255,255,0.16);

    transform: scale(1.04);
  }

}

/* -----------------------------------------
   ARTICLE CONTENT
----------------------------------------- */

.article-content {
  max-width: 680px;
  margin: 0 auto;

  font-size: 1.15rem;
  line-height: 1.9;
}

/* Vertical rhythm */


/* Lead paragraph */

.article .lead {
  font-size: clamp(1.2rem, 1.4vw, 1.5rem);
  line-height: 1.6;
  font-weight: 500;
  letter-spacing: -0.01em;

  max-width: 56ch;

  color: #111;

  margin: 0 auto 3rem;
}

/* Paragraphs */

.article-content p {
  width: 100%;
}
.article-content p,
.article-content h2,
.article-content h3,
.article-content ul,
.article-content ol,
.article-content blockquote {
  width: 100%;
}

/* Headings */

.article-content h2 {
  font-size: var(--text-h2);
  line-height: var(--leading-h2);
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-top: 3.5rem;
  margin-bottom: 1.25rem;

}

.article-content h3 {
  font-size: 1.6rem;
  line-height: 1.2;

  letter-spacing: -0.03em;

  margin-top: 3rem;
  margin-bottom: 1rem;

  max-width: 18ch;
}

/* Links */

.article-content a {
  color: inherit;

  text-decoration: underline;
  text-underline-offset: 3px;
}

/* Lists */

.article-content ul,
.article-content ol {
  padding-left: 1.4rem;

  max-width: 40ch;
}

.article-content li {
  margin-bottom: 0.8rem;
}

/* Quotes */

.article-content blockquote {
  margin: 5rem 0;
  padding-left: 2rem;

  border-left: 2px solid #ddd;

  font-size: 2rem;
  line-height: 1.3;

  color: #111;

  max-width: 16ch;
}

/* Images inside article */

.article-content img {
  width: 100%;
  margin: 80px 0;

  display: block;
}

/* Figure captions */

.article-content figcaption {
  font-size: 0.9rem;
  color: #777;

  margin-top: -50px;
  margin-bottom: 50px;
}

/* Code blocks */

.article-content pre {
  overflow-x: auto;

  padding: 24px;

  background: #f3f3f3;

  font-size: 0.95rem;
  line-height: 1.6;

  margin: 3rem 0;
}

/* Inline code */

.article-content code {
  font-family: monospace;
}

/* Tables */

.article-content table {
  width: 100%;
  border-collapse: collapse;

  margin: 4rem 0;
}

.article-content th,
.article-content td {
  padding: 14px;

  border-bottom: 1px solid #ddd;

  text-align: left;
}

/* -----------------------------------------
   OPTIONAL SIDEBAR
----------------------------------------- */

.article-grid {
  display: grid;
  grid-template-columns: 3fr 1fr;

  gap: 60px;
}

.article-sidebar {
  font-size: 0.92rem;
  color: #666;
}

.tags span {
  display: inline-block;
  margin-right: 10px;
}

----------------------------------------- */

@media (max-width: 768px) {

  .article-container {
    padding: 40px 24px 80px;
  }

  .article-hero-split {
    grid-template-columns: 1fr;
    grid-template-areas:
      "image"
