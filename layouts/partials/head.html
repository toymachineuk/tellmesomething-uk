/* Fullscreen container */
.story-modal {
  position: fixed;
  inset: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(0, 0, 0, 0.85);
  padding: 20px;
    animation: fadeIn 0.25s ease;
}




/* Close button */
.story-close {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 20;

  width: 48px;
  height: 48px;

  display: flex;
  align-items: center;
  justify-content: center;

  border: 1px solid rgba(255,255,255,.18);
  border-radius: 50%;

  background: rgba(18,18,18,.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  cursor: pointer;

  transition: all .25s ease;
}

.story-close:hover {
  background: rgba(255,255,255,.15);
  border-color: rgba(255,255,255,.35);
  transform: scale(1.06);
}

.story-close:active {
  transform: scale(.96);
}

.story-close svg {
  width: 22px;
  height: 22px;
}

.story-close:focus,
.story-close:focus-visible {
    outline: none;
    box-shadow: none;
}

@media (hover: hover) {

  .story-close:hover {
    background:
      rgba(255,255,255,0.16);

    border-color:
      rgba(255,255,255,0.34);

    transform: scale(1.04);
  }

}


/* Optional: subtle fade-in */
.story-modal {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
